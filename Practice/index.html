<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <h1>DOM & jQuery Practice</h1>

  <!-- Exercise 1: Select, Click, and Style -->
  <p id="target-text">Change my color!</p>
  <button id="color-btn">Click Me</button>

  <hr>

  <!-- Exercise 2: Add and Remove Elements -->
  <h2>Exercise 2: Add & Remove</h2>
  <ul id="item-list">
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
  </ul>
  <button id="add-btn">Add Item</button>
  <button id="remove-btn">Remove Last</button>

  <hr>

  <!-- Exercise 3: Dynamic Styling -->
  <h2>Exercise 3: Dynamic Color</h2>
  <input type="text" id="color-input" placeholder="Type a color...">
  <button id="apply-btn">Apply</button>
  <div id="color-box"></div>

  <!-- J query EX 1-->
   <h2>J query Ex1</h2>
   <button id="j-btn">Click me!</button>

  <hr>

  <!-- Exercise: Todo List (Class + Event Delegation) -->
  <h2>Todo List</h2>
  <input type="text" id="todo-input" placeholder="New todo...">
  <button id="todo-add">Add</button>
  <ul id="todo-list"></ul>

  <hr>

  <!-- jQuery + Class + Event Delegation -->
  <h2>Card Maker (jQuery)</h2>
  <input type="text" id="card-title" placeholder="Card title...">
  <input type="text" id="card-color" placeholder="Color...">
  <button id="card-add">Add Card</button>
  <div id="card-container"></div>


  <!-- jQuery + Class + Event Delegation -->
   <hr>
   <h2>Shopping List</h2>
   <div style="display: flex;">
    <p style="padding: 10px;">Add an item: </p>
    <input style="padding: 10px;" type="text" id="shopping-input" placeholder="Item you want...">
    <p id="item-count" style="padding: 10px;">0</p>
    <div style="display: flex; flex-direction: column; padding: 10px;">
      <button style="padding: 10px;" id="shop-inc-btn">+</button>
      <button style="padding: 10px;" id="shop-dec-btn">-</button>
    </div>
    <button style="padding: 10px;" id="shop-add-btn">Add Item</button>
  </div>

  <h4>List:</h4>
  <ul id="shopping-list"></ul>
  
   
   

  <script src="script.js"></script>
</body>
</html>
